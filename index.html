<!doctype html>
<html lang="en-NG">
  <head>
    <!-- CSP script-src hardening (see vercel.json's Content-Security-Policy-
         Report-Only): every inline script tag below with no src attribute
         (structured data, font-preload listener, Pendo bootstrap) is
         allowlisted by a 'sha256-<hash>' entry instead of 'unsafe-inline'.

         If you edit any of those scripts' content: `npm run build` then
         `node scripts/compute-csp-hashes.mjs`, and swap the matching hash
         into vercel.json's Report-Only value.

         Two more sha256 hashes also live in that same script-src value,
         with no corresponding script anywhere in this repo: Google
         Identity Services (loaded for the "Continue with Google" button)
         injects its own inline scripts directly into the page at runtime,
         not just into its iframe. Those hashes were read off an actual
         CSP violation report in the browser console, not computed by
         scripts/compute-csp-hashes.mjs -- if Google ever changes that
         injected content, script-src will start silently failing to run
         it, and the fix is to sign in, read the new hash off the console
         warning, and swap it in. This is a real, ongoing fragility (Google
         controls that content, not us) which is exactly why this is still
         Report-Only and not enforced.

         Currently running Report-Only specifically to catch a stale/missed
         hash -- ours or Google's -- via browser console warnings before it
         would ever actually block something in production. -->
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Structured data -->
    <!-- CSP: this exact content is allowlisted by a sha256 hash in
         vercel.json's Content-Security-Policy-Report-Only script-src.
         Any edit to the text below invalidates that hash and must be
         paired with recomputing it (see the CSP note at the top of
         <head> for how). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Glasspay",
          "url": "https://glasspay.app"
        },
        {
          "@type": "Organization",
          "name": "Glasspay",
          "url": "https://glasspay.app",
          "logo": "https://glasspay.app/Glass.png",
          "email": "glasspayhq@gmail.com",
          "sameAs": [
            "https://x.com/glasspayhq",
            "https://www.instagram.com/glasspayhq"
          ]
        },
        {
          "@type": "SoftwareApplication",
          "name": "Glasspay",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "url": "https://glasspay.app",
          "description": "Community finance platform for Nigerian associations, clubs, and schools.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "NGN"
          }
        }
      ]
    }
    </script>

    <!-- SEO -->
    <title>Glasspay: Community Finance, Crystal Clear</title>
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="Stop chasing dues in group chats. Glasspay lets Nigerian associations, clubs, and schools collect, track, and manage community funds in one place."
    />
    <meta
      name="keywords"
      content="community finance Nigeria, dues collection app, payment management Nigeria, associations fintech, clubs payment Nigeria"
    />
    <link rel="canonical" href="https://glasspay.app/" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#002FA7" />

    <!-- Open Graph -->
    <meta property="og:title" content="Glasspay: Community Finance, Crystal Clear" />
    <meta
      property="og:description"
      content="Stop chasing dues in group chats. Glasspay lets Nigerian associations, clubs, and schools collect, track, and manage community funds in one place."
    />
    <meta property="og:url" content="https://glasspay.app/" />
    <meta property="og:type" content="website" />
    <!-- Hosted on app.glasspay.app (not the glasspay.app apex) -- this asset
         is identical on both domains, but the apex has a history of Vercel
         deployment/domain-pinning lag, while the app subdomain reliably
         tracks the latest deploy. Pointing here removes that dependency. -->
    <meta property="og:image" content="https://app.glasspay.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Glasspay: community finance, crystal clear" />
    <meta property="og:site_name" content="Glasspay" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@glasspayhq" />
    <meta name="twitter:title" content="Glasspay: Community Finance, Crystal Clear" />
    <meta
      name="twitter:description"
      content="Stop chasing dues in group chats. Glasspay helps your community collect and track funds in one place."
    />
    <meta name="twitter:image" content="https://app.glasspay.app/og-image.png" />

    <!-- Fonts (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      id="font-preload-link"
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap"
    />
    <!-- CSP: hash-allowlisted (see the CSP note at the top of <head>) -- an
         inline onload="" attribute on the <link> above was replaced with
         this listener specifically because CSP hashes/nonces don't cover
         inline event-handler attributes, only script tags. -->
    <script>
    (function () {
      var link = document.getElementById('font-preload-link');
      if (link) {
        link.addEventListener('load', function () {
          this.rel = 'stylesheet';
        }, { once: true });
      }
    })();
    </script>
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap"
      />
    </noscript>

    <!-- Pendo -->
    <!-- CSP: hash-allowlisted (see the CSP note at the top of <head>). The
         API key below is part of the hashed content -- rotating it (or
         Pendo changing this bootstrap snippet) invalidates the hash and
         needs it recomputed, same as the structured-data block above. -->
    <script>
    (function(apiKey){
        (function(p,e,n,d,o){var v,w,x,y,z;o=p[d]=p[d]||{};o._q=o._q||[];
        v=['initialize','identify','updateOptions','pageLoad','track', 'trackAgent'];for(w=0,x=v.length;w<x;++w)(function(m){
        o[m]=o[m]||function(){o._q[m===v[0]?'unshift':'push']([m].concat([].slice.call(arguments,0)));};})(v[w]);
        y=e.createElement(n);y.async=!0;y.src='https://cdn.pendo.io/agent/static/'+apiKey+'/pendo.js';
        z=e.getElementsByTagName(n)[0];z.parentNode.insertBefore(y,z);})(window,document,'script','pendo');
    })('35c6c2bb-9b67-4827-a2ca-c46d501329c2');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
